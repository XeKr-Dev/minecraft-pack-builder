name: Deploy vue.js site to Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/page.yml
      - src/**
      - public/**
      - .env.development
      - .env.production
      - index.html
      - package.json
      - tsconfig.app.json
      - tsconfig.json
      - tsconfig.node.json
      - vite.config.ts

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [ 22.x ]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Use pnpm
        run: npm i -g pnpm
      - name: Prepare Dependency
        run: pnpm i
      - name: Build with vue.js
        run: pnpm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
      - name: Update Pages
        uses: Gu-ZT/1panel-actions@1.0.5
        with:
          url: ${{ secrets.ONEPANEL_URL }}
          token: ${{ secrets.ONEPANEL_TOKEN }}
          action: runScript
          params: |
            name=更新 build.ztxy666.cn

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
